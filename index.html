            if (gameRunning) gamePaused = true;

        // ============================================================
        function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('open'); }
        function closeMobileMenu() { document.getElementById('mobileMenu').classList.remove('open'); }

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('mobileMenu');
            const hamburger = document.querySelector('.hamburger');
            if (menu.classList.contains('open') && !menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('open');
            }
        });

        // ============================================================
        // GAME
        // ============================================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const healthEl = document.getElementById('healthCount');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startButton');
        const restartBtn = document.getElementById('restartButton');
        const achievementEl = document.getElementById('achievement');

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let score = 0, gameRunning = false, gamePaused = false, achievementShown = false, frame = 0;
        let player = { x: canvas.width/2, y: canvas.height - 80, w: 44, h: 44, health: 3 };
        let bullets = [], enemyBullets = [], enemies = [], explosions = [];
        let touchX = player.x, loopId = null;
        window._loopActive = false;

        function updateUI() { scoreEl.textContent = '⚡ ' + score; healthEl.textContent = player.health; }

        // ---- DRAW ----
        function drawPlayer() {
            ctx.save(); ctx.translate(player.x, player.y);
            ctx.shadowColor = '#2a8aff'; ctx.shadowBlur = 30;
            ctx.fillStyle = '#3d8cff';
            ctx.beginPath(); ctx.moveTo(0, -28); ctx.lineTo(-14, 14); ctx.lineTo(0, 6); ctx.lineTo(14, 14); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#b3d9ff';
            ctx.beginPath(); ctx.arc(0, -4, 6, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1f5fc9'; ctx.fillRect(-26, 0, 52, 5);
            ctx.fillStyle = '#ffbb33'; ctx.shadowColor = '#ff8800'; ctx.shadowBlur = 30;
            ctx.beginPath(); ctx.arc(0, 18, 6, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            for (let i = 0; i < player.health; i++) {
                ctx.fillStyle = '#ff4444'; ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 10;
                ctx.fillRect(-20 + i*15, -38, 10, 4); ctx.shadowBlur = 0;
            }
            ctx.restore();
        }

        function drawEnemy(x, y) {
            ctx.save(); ctx.translate(x, y);
            ctx.shadowColor = '#ff3a3a'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#e04a4a';
            ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-14, -14); ctx.lineTo(0, -4); ctx.lineTo(14, -14); ctx.closePath(); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ff8a8a';
            ctx.beginPath(); ctx.arc(0, 4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#b32a2a'; ctx.fillRect(-24, -2, 48, 4);
            ctx.restore();
        }

        class Explosion {
            constructor(x, y, size = 1) {
                this.particles = [];
                for (let i = 0; i < 18 * size + 12; i++) {
                    const a = Math.random() * Math.PI * 2, s = 0.8 + Math.random() * 3.2 * size;
                    this.particles.push({
                        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
                        r: 1.5 + Math.random() * 3.5 * size,
                        life: 30 + Math.random() * 28, maxLife: 30 + Math.random() * 28,
                        color: `hsl(${30+Math.random()*40}, 100%, ${50+Math.random()*30}%)`
                    });
                }
            }
            update() {
                let alive = false;
                for (const p of this.particles) {
                    p.x += p.vx; p.y += p.vy; p.vx *= 0.98; p.vy *= 0.98; p.life--;
                    if (p.life > 0) alive = true;
                }
                return alive;
            }
            draw() {
                for (const p of this.particles) {
                    if (p.life <= 0) continue;
                    const alpha = Math.min(1, p.life / p.maxLife * 1.2);
                    ctx.globalAlpha = alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r * (0.4 + 0.6 * p.life / p.maxLife), 0, Math.PI * 2);
                    ctx.fillStyle = p.color; ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        }

        function shoot() { if (!gameRunning || gamePaused) return; bullets.push({ x: player.x, y: player.y - 32, speed: 16, r: 4 }); }
        function enemyShoot(x, y) { enemyBullets.push({ x, y: y + 30, speed: 4.2 + Math.min(score * 0.008, 3), r: 5 }); }
        function spawnEnemy() {
            enemies.push({
                x: 30 + Math.random() * (canvas.width - 60), y: -60,
                w: 40 + Math.random() * 12, h: 40 + Math.random() * 12,
                speed: 1.6 + Math.random() * 2.4 + score * 0.0006
            });
        }
        function createExplosion(x, y, s = 1) { explosions.push(new Explosion(x, y, s)); }

        function showAchievement() {
            achievementEl.style.display = 'block';
            setTimeout(() => achievementEl.style.display = 'none', 2800);
        }

        // ---- UPDATE ----
        function update() {
            if (!gameRunning || gamePaused) return;

            if (score >= 1000 && !achievementShown) { showAchievement(); achievementShown = true; }

            player.x += (touchX - player.x) * 0.18;
            player.x = Math.max(22, Math.min(canvas.width - 22, player.x));
            player.y = canvas.height - 80;

            for (let i = bullets.length - 1; i >= 0; i--) { bullets[i].y -= bullets[i].speed; if (bullets[i].y < -20) bullets.splice(i, 1); }
            for (let i = enemyBullets.length - 1; i >= 0; i--) { enemyBullets[i].y += enemyBullets[i].speed; if (enemyBullets[i].y > canvas.height + 30) enemyBullets.splice(i, 1); }

            const spawnRate = Math.max(380, 800 - score * 0.15);
            if (frame % Math.floor(spawnRate / 16) === 0 && enemies.length < 8 + Math.floor(score / 120)) spawnEnemy();

            for (const enemy of enemies) {
                if (frame % 8 === 0 && Math.random() < 0.06 + Math.min(score * 0.00008, 0.12)) enemyShoot(enemy.x, enemy.y);
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;
                if (e.y > canvas.height + 60) { enemies.splice(i, 1); continue; }

                let hit = false;
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (Math.hypot(b.x - e.x, b.y - e.y) < 22) {
                        createExplosion(e.x, e.y, 0.9);
                        enemies.splice(i, 1); bullets.splice(j, 1);
                        score += 10; updateUI();
                        if (score >= 1000) showAchievement();
                        hit = true; break;
                    }
                }
                if (hit) continue;

                if (Math.hypot(player.x - e.x, player.y - e.y) < 30) {
                    createExplosion(e.x, e.y, 1.4);
                    enemies.splice(i, 1);
                    player.health--; updateUI();
                    if (player.health <= 0) { createExplosion(player.x, player.y, 2); gameOver(); return; }
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const b = enemyBullets[i];
                if (Math.hypot(b.x - player.x, b.y - player.y) < 18) {
                    createExplosion(b.x, b.y, 0.6);
                    enemyBullets.splice(i, 1);
                    player.health--; updateUI();
                    if (player.health <= 0) { createExplosion(player.x, player.y, 2); gameOver(); return; }
                }
            }

            for (let i = explosions.length - 1; i >= 0; i--) { if (!explosions[i].update()) explosions.splice(i, 1); }
            if (explosions.length > 30) explosions.splice(0, explosions.length - 30);
            frame++;
        }

        // ---- DRAW ----
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const t = Date.now() / 800;
            for (let i = 0; i < 120; i++) {
                const sx = (i * 137.5 + 50) % canvas.width;
                const sy = (i * 97.3 + t * 20 + 30) % canvas.height;
                const b = 0.4 + 0.6 * Math.sin(i * 2.1 + t * 0.5);
                ctx.fillStyle = `rgba(255,255,255,${b*0.5})`;
                ctx.beginPath(); ctx.arc(sx, sy, 0.6 + i % 3 * 0.4, 0, Math.PI * 2); ctx.fill();
            }
            drawPlayer();
            for (const e of enemies) drawEnemy(e.x, e.y);
            ctx.fillStyle = '#ffe066'; ctx.shadowColor = '#ffcc33'; ctx.shadowBlur = 18;
            for (const b of bullets) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); }
            ctx.fillStyle = '#ff5e5e'; ctx.shadowColor = '#ff2222'; ctx.shadowBlur = 20;
            for (const b of enemyBullets) { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); }
            ctx.shadowBlur = 0;
            for (const ex of explosions) ex.draw();
        }

        // ---- GAME LOOP ----
        function gameLoop() {
            if (!gameRunning) { draw(); loopId = requestAnimationFrame(gameLoop); return; }
            update(); draw();
            if (gameRunning) loopId = requestAnimationFrame(gameLoop);
            else window._loopActive = false;
        }

        function gameOver() {
            gameRunning = false; gamePaused = false; window._loopActive = false;
            if (loopId) { cancelAnimationFrame(loopId); loopId = null; }
            finalScoreEl.textContent = score; gameOverEl.style.display = 'block';
        }

        function startGame() {
            score = 0; achievementShown = false; player.health = 3;
            player.x = canvas.width/2; player.y = canvas.height - 80;
            bullets = []; enemyBullets = []; enemies = []; explosions = [];
            frame = 0; touchX = player.x;
            gameOverEl.style.display = 'none'; startScreen.style.display = 'none';
            achievementEl.style.display = 'none';
            updateUI();
            gameRunning = true; gamePaused = false; window._loopActive = true;
            if (loopId) { cancelAnimationFrame(loopId); loopId = null; }
            gameLoop();
        }

        // ---- INPUT ----
        function handlePointer(x) { if (gameRunning && !gamePaused) touchX = x; }
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; if (t) handlePointer(t.clientX); }, { passive: false });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault(); const t = e.touches[0];
            if (t) { handlePointer(t.clientX); if (gameRunning && !gamePaused) shoot(); }
        }, { passive: false });
        canvas.addEventListener('mousemove', e => handlePointer(e.clientX));
        canvas.addEventListener('click', () => { if (gameRunning && !gamePaused) shoot(); });

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            resizeCanvas();
            if (!gameRunning) { player.x = canvas.width/2; player.y = canvas.height - 80; }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (modal.classList.contains('active')) closePolicy();
                document.getElementById('mobileMenu').classList.remove('open');
            }
            if (e.key === ' ' && gameRunning && !gamePaused) { e.preventDefault(); shoot(); }
        });

        // ---- INIT ----
        updateUI();
        gameRunning = false;
        window._loopActive = true;
        gameLoop();
    </script>
</body>
</html>
